name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tar_sha256: ${{ steps.sha256.outputs.tar_sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: bun install

      - name: Build universal binary
        run: bun run tauri build --target universal-apple-darwin

      - name: Package tar.gz for Homebrew
        run: |
          BINARY="src-tauri/target/universal-apple-darwin/release/streambreak"
          tar -czf streambreak-universal-apple-darwin.tar.gz \
            -C "$(dirname "$BINARY")" "$(basename "$BINARY")"

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 streambreak-universal-apple-darwin.tar.gz | awk '{print $1}')
          echo "tar_sha256=$SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: streambreak-tar
          path: streambreak-universal-apple-darwin.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: streambreak-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update homebrew-tap repo
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.tar_sha256 }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/rhc98/homebrew-tap.git /tmp/homebrew-tap
          cat > /tmp/homebrew-tap/Formula/streambreak.rb << 'FORMULA'
          class Streambreak < Formula
            desc "Break time content during AI coding waits"
            homepage "https://github.com/rhc98/streambreak"
            version "VERSION_PLACEHOLDER"
            url "https://github.com/rhc98/streambreak/releases/download/vVERSION_PLACEHOLDER/streambreak-universal-apple-darwin.tar.gz"
            sha256 "SHA256_PLACEHOLDER"

            def install
              bin.install "streambreak"
            end

            def caveats
              <<~EOS
                If macOS blocks the binary (Gatekeeper), run:
                  xattr -d com.apple.quarantine #{bin}/streambreak

                Then set up Claude Code hooks:
                  streambreak init
              EOS
            end

            test do
              system "#{bin}/streambreak", "--version"
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" /tmp/homebrew-tap/Formula/streambreak.rb
          sed -i "s/SHA256_PLACEHOLDER/$SHA256/" /tmp/homebrew-tap/Formula/streambreak.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/streambreak.rb
          git commit -m "chore: update streambreak to v$VERSION"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            streambreak-universal-apple-darwin.tar.gz
            *.dmg
