<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Left bar -->
  <rect x="120" y="116" width="72" height="280" rx="20" fill="url(#barGrad)"/>

  <!-- Right bar -->
  <rect x="320" y="116" width="72" height="280" rx="20" fill="url(#barGrad)"/>

  <!-- Content lines between bars (news feed, centered in gap) -->
  <rect x="208" y="208" width="96" height="14" rx="7" fill="url(#lineGrad)" opacity="0.9"/>
  <rect x="220" y="244" width="72" height="14" rx="7" fill="url(#lineGrad)" opacity="0.65"/>
  <rect x="228" y="280" width="56" height="14" rx="7" fill="url(#lineGrad)" opacity="0.4"/>
</svg>
